<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>담담</title>
  <link rel="icon" href="./favicon.png">
  <meta property="og:image" content="./favicon.png">
  <meta property="og:url" content="https://hyunra94.github.io/damdam/">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FF8FAB">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --pink:       #FF8FAB;
      --pink-light: #FFD6E0;
      --pink-pale:  #FFF0F5;
      --pink-deep:  #E8557A;
      --text:       #2D2D2D;
      --text-sub:   #888;
      --bg:         #F9F4F6;
      --white:      #FFFFFF;
      --radius:     16px;
      --shadow:     0 2px 12px rgba(0,0,0,0.07);
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      min-height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── 헤더 ── */
    .header {
      position: sticky; top: 0; z-index: 10;
      background: var(--white);
      padding: 14px 16px calc(14px + env(safe-area-inset-top));
      padding-top: calc(14px + env(safe-area-inset-top));
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 1px 8px rgba(0,0,0,0.06);
    }
    .header-title {
      font-size: 22px; font-weight: 700; color: var(--pink-deep);
      letter-spacing: -0.5px;
    }
    .header-title span { color: var(--pink); }
    .header-icons { display: flex; gap: 4px; }
    .icon-btn {
      width: 38px; height: 38px; border-radius: 50%;
      border: none; background: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; transition: background .15s;
    }
    .icon-btn:active { background: var(--pink-pale); }

    /* ── 폴더 탭 ── */
    .tabs-wrap {
      overflow-x: auto; scrollbar-width: none;
      padding: 12px 16px 4px;
      display: flex; gap: 8px;
      background: var(--white);
      border-bottom: 1px solid #F0E8EC;
    }
    .tabs-wrap::-webkit-scrollbar { display: none; }
    .tab {
      padding: 7px 14px; border-radius: 20px;
      font-size: 13px; font-weight: 500;
      white-space: nowrap; cursor: pointer;
      border: 1.5px solid #EAEAEA;
      background: var(--white);
      color: var(--text-sub);
      transition: all .15s;
      flex-shrink: 0;
    }
    .tab.active {
      background: var(--pink);
      border-color: var(--pink);
      color: white; font-weight: 700;
    }

    /* ── 아이템 그리드 ── */
    .grid {
      padding: 14px 12px;
      columns: 2; column-gap: 10px;
    }
    .card {
      break-inside: avoid;
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      position: relative;
    }
    .card:active { transform: scale(.97); box-shadow: none; }

    .card-thumb {
      width: 100%; aspect-ratio: 16/9;
      object-fit: cover;
      background: var(--pink-pale);
      display: block;
    }
    .card-thumb.tall { aspect-ratio: 1; }

    .card-body { padding: 10px 10px 12px; }
    .card-type {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 10px; font-weight: 700;
      color: var(--pink-deep);
      background: var(--pink-pale);
      padding: 2px 7px; border-radius: 8px;
      margin-bottom: 5px;
    }
    .card-title {
      font-size: 13px; font-weight: 500; color: var(--text);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-sub {
      font-size: 11px; color: var(--text-sub);
      margin-top: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-memo {
      font-size: 11px; color: var(--text-sub);
      margin-top: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-folder {
      font-size: 10px; color: var(--pink);
      margin-top: 5px;
    }

    /* memo 전용 카드 */
    .card-memo-only {
      padding: 14px 12px;
      font-size: 13px; color: var(--text);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 6;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* 삭제 버튼 */
    .card-del {
      position: absolute; top: 6px; right: 6px;
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(0,0,0,0.5); border: none; cursor: pointer;
      color: white; font-size: 13px;
      display: none; align-items: center; justify-content: center;
    }
    .card.editing .card-del { display: flex; }
    .card.editing { animation: wiggle .3s ease infinite alternate; }
    @keyframes wiggle {
      from { transform: rotate(-1.5deg); }
      to   { transform: rotate(1.5deg); }
    }

    /* ── 빈 상태 ── */
    .empty {
      text-align: center; padding: 60px 20px;
      color: var(--text-sub);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty-desc  { font-size: 13px; }

    /* ── 로딩 ── */
    .loading {
      text-align: center; padding: 60px 20px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--pink-light);
      border-top-color: var(--pink);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 설정 모달 ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 50;
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      width: 100%; max-width: 480px;
      background: var(--white);
      border-radius: 24px 24px 0 0;
      padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
      animation: slideUp .25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    .modal-title {
      font-size: 18px; font-weight: 700; color: var(--text);
      margin-bottom: 20px;
    }
    .field-label {
      font-size: 13px; font-weight: 700; color: var(--text-sub);
      margin-bottom: 6px; margin-top: 14px;
    }
    .field-label:first-of-type { margin-top: 0; }
    .field-input {
      width: 100%;
      border: 1.5px solid #EAEAEA; border-radius: 12px;
      padding: 11px 14px;
      font-family: inherit; font-size: 14px; color: var(--text);
      outline: none; transition: border-color .15s;
    }
    .field-input:focus { border-color: var(--pink); }
    .modal-save {
      width: 100%; padding: 14px;
      background: var(--pink); border: none; border-radius: 14px;
      font-family: inherit; font-size: 16px; font-weight: 700;
      color: white; cursor: pointer;
      margin-top: 20px; transition: background .15s;
    }
    .modal-save:active { background: var(--pink-deep); }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: none; border: none; cursor: pointer;
      font-size: 22px; color: var(--text-sub);
    }

    /* ── toast ── */
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.75); color: white;
      padding: 10px 20px; border-radius: 20px;
      font-size: 14px; white-space: nowrap;
      animation: fadeInOut 2.5s ease forwards; z-index: 999;
    }
    @keyframes fadeInOut {
      0%   { opacity: 0; transform: translateX(-50%) translateY(10px); }
      15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
      80%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* ── 편집 모드 배너 ── */
    .edit-banner {
      display: none;
      position: fixed; bottom: calc(20px + env(safe-area-inset-bottom)); left: 50%;
      transform: translateX(-50%);
      background: var(--text); color: white;
      padding: 10px 20px; border-radius: 20px;
      font-size: 13px; font-weight: 500;
      z-index: 20;
    }
    .edit-banner.show { display: block; }
  </style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div class="header-title">담<span>담</span></div>
  <div class="header-icons">
    <button class="icon-btn" onclick="toggleEditMode()" id="editBtn" title="편집">✂️</button>
    <button class="icon-btn" onclick="openSettings()" title="설정">⚙️</button>
  </div>
</div>

<!-- 폴더 탭 -->
<div class="tabs-wrap" id="tabsWrap">
  <div class="tab active" data-folder="all" onclick="selectTab(this, 'all')">전체</div>
</div>

<!-- 아이템 그리드 -->
<div class="grid" id="itemGrid">
  <div class="loading"><div class="spinner"></div></div>
</div>

<!-- 편집 모드 배너 -->
<div class="edit-banner" id="editBanner">카드를 눌러 삭제 &nbsp; | &nbsp; 다시 눌러 완료</div>

<!-- 설정 모달 -->
<div class="modal-overlay" id="settingsModal" onclick="closeSettings(event)">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="closeSettingsBtn()">✕</button>
    <div class="modal-title">⚙️ 설정</div>

    <div class="field-label">Worker URL</div>
    <input class="field-input" id="inputWorkerUrl" type="url"
      placeholder="https://xxx.workers.dev">

    <div class="field-label">Secret Key</div>
    <input class="field-input" id="inputSecretKey" type="password"
      placeholder="비밀 키 입력">

    <button class="modal-save" onclick="saveSettings()">저장</button>
  </div>
</div>

<script>
// ─── 상태 ──────────────────────────────────────────────────────────────────────
let WORKER_URL    = localStorage.getItem('damdam_worker_url') || '';
let SECRET_KEY    = localStorage.getItem('damdam_secret_key') || '';
let currentFolder = 'all';
let editMode      = false;
let items         = [];

// ─── 초기화 ────────────────────────────────────────────────────────────────────
async function init() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  if (!WORKER_URL || !SECRET_KEY) {
    openSettings();
    return;
  }

  await loadFolders();
  await loadItems('all');
}

// ─── 폴더 탭 ──────────────────────────────────────────────────────────────────
async function loadFolders() {
  try {
    const res  = await apiFetch('/folders');
    const data = await res.json();
    const wrap = document.getElementById('tabsWrap');

    (data.folders || []).forEach(name => {
      const tab = document.createElement('div');
      tab.className     = 'tab';
      tab.dataset.folder = name;
      tab.textContent   = name;
      tab.onclick       = () => selectTab(tab, name);
      wrap.appendChild(tab);
    });
  } catch (_) {}
}

function selectTab(el, folder) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentFolder = folder;
  loadItems(folder);
}

// ─── 아이템 로드 ──────────────────────────────────────────────────────────────
async function loadItems(folder) {
  const grid = document.getElementById('itemGrid');
  grid.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  try {
    const res  = await apiFetch(`/list?folder=${encodeURIComponent(folder)}`);
    const data = await res.json();
    items = data.items || [];
    renderItems();
  } catch (e) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">😢</div><div class="empty-title">불러오기 실패</div><div class="empty-desc">네트워크를 확인해주세요</div></div>';
  }
}

function renderItems() {
  const grid = document.getElementById('itemGrid');
  if (!items.length) {
    grid.innerHTML = `
      <div class="empty" style="column-span:all">
        <div class="empty-icon">🌸</div>
        <div class="empty-title">아직 저장된 게 없어요</div>
        <div class="empty-desc">공유 버튼으로 담담에 저장해보세요!</div>
      </div>`;
    return;
  }

  grid.innerHTML = '';
  items.forEach((item, idx) => {
    const card = buildCard(item, idx);
    grid.appendChild(card);
  });
}

function buildCard(item, idx) {
  const card = document.createElement('div');
  card.className = 'card' + (editMode ? ' editing' : '');
  card.dataset.idx = idx;

  // 삭제 버튼
  const delBtn = document.createElement('button');
  delBtn.className = 'card-del';
  delBtn.textContent = '✕';
  delBtn.onclick = (e) => { e.stopPropagation(); deleteItem(item, card); };
  card.appendChild(delBtn);

  if (item.type === 'image') {
    const imgKey = item.image_key;
    const src    = imgKey.startsWith('http') ? imgKey : `${WORKER_URL}/r2/${encodeURIComponent(imgKey)}`;
    card.innerHTML += `
      <img class="card-thumb tall" src="${escHtml(src)}" alt="${escHtml(item.title)}"
           onerror="this.style.display='none'">
      <div class="card-body">
        <div class="card-type">🖼 이미지</div>
        <div class="card-title">${escHtml(item.title)}</div>
        ${item.memo  ? `<div class="card-memo">${escHtml(item.memo)}</div>` : ''}
        ${item.folder ? `<div class="card-folder"># ${escHtml(item.folder)}</div>` : ''}
      </div>`;
    card.onclick = () => editMode ? null : openImageViewer(src, item.title);

  } else if (item.type === 'link') {
    const thumb = item.image_key;
    card.innerHTML += `
      ${thumb ? `<img class="card-thumb" src="${escHtml(thumb)}" alt=""
                      onerror="this.style.display='none'">` : ''}
      <div class="card-body">
        <div class="card-type">🔗 링크</div>
        <div class="card-title">${escHtml(item.title)}</div>
        ${item.url ? `<div class="card-sub">${escHtml(getDomain(item.url))}</div>` : ''}
        ${item.memo  ? `<div class="card-memo">${escHtml(item.memo)}</div>` : ''}
        ${item.folder ? `<div class="card-folder"># ${escHtml(item.folder)}</div>` : ''}
      </div>`;
    card.onclick = () => editMode ? null : (item.url && window.open(item.url, '_blank'));

  } else {
    card.innerHTML += `
      <div class="card-memo-only">${escHtml(item.memo || item.title)}</div>
      <div class="card-body" style="padding-top:0">
        <div class="card-type">📝 메모</div>
        ${item.folder ? `<div class="card-folder"># ${escHtml(item.folder)}</div>` : ''}
      </div>`;
  }

  return card;
}

// ─── 이미지 뷰어 ──────────────────────────────────────────────────────────────
function openImageViewer(src, title) {
  const overlay = document.createElement('div');
  overlay.style.cssText = `
    position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:100;
    display:flex; align-items:center; justify-content:center;
    animation: fadeIn .2s ease;
  `;
  overlay.innerHTML = `
    <img src="${escHtml(src)}" alt="${escHtml(title)}"
         style="max-width:95vw; max-height:90dvh; border-radius:12px; object-fit:contain;">
    <button style="position:absolute;top:16px;right:16px;background:none;border:none;
      color:white;font-size:28px;cursor:pointer;line-height:1;" onclick="this.parentElement.remove()">✕</button>
  `;
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  document.body.appendChild(overlay);
}

// ─── 삭제 ──────────────────────────────────────────────────────────────────────
async function deleteItem(item, card) {
  if (!confirm(`"${item.title || '이 항목'}"을 삭제할까요?`)) return;
  try {
    await apiFetch('/delete', 'POST', { id: item.id, image_key: item.image_key });
    card.style.animation = 'none';
    card.style.opacity   = '0';
    card.style.transform = 'scale(0.8)';
    card.style.transition = 'all .2s';
    setTimeout(() => { card.remove(); }, 200);
    items = items.filter(i => i.id !== item.id);
    showToast('삭제했어요');
  } catch (e) {
    showToast('삭제 실패: ' + e.message);
  }
}

// ─── 편집 모드 ────────────────────────────────────────────────────────────────
function toggleEditMode() {
  editMode = !editMode;
  document.getElementById('editBtn').textContent  = editMode ? '✅' : '✂️';
  document.getElementById('editBanner').classList.toggle('show', editMode);
  document.querySelectorAll('.card').forEach(c => c.classList.toggle('editing', editMode));
}

// ─── 설정 ────────────────────────────────────────────────────────────────────
function openSettings() {
  document.getElementById('inputWorkerUrl').value = WORKER_URL;
  document.getElementById('inputSecretKey').value = SECRET_KEY;
  document.getElementById('settingsModal').classList.add('show');
}
function closeSettings(e) {
  if (e.target.id === 'settingsModal') closeSettingsBtn();
}
function closeSettingsBtn() {
  document.getElementById('settingsModal').classList.remove('show');
}
function saveSettings() {
  WORKER_URL = document.getElementById('inputWorkerUrl').value.trim().replace(/\/$/, '');
  SECRET_KEY = document.getElementById('inputSecretKey').value.trim();
  localStorage.setItem('damdam_worker_url', WORKER_URL);
  localStorage.setItem('damdam_secret_key', SECRET_KEY);
  closeSettingsBtn();
  showToast('설정 저장 완료!');
  location.reload();
}

// ─── API 유틸 ────────────────────────────────────────────────────────────────
function apiFetch(path, method = 'GET', body = null) {
  const opts = {
    method,
    headers: { 'X-Secret-Key': SECRET_KEY }
  };
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  return fetch(WORKER_URL + path, opts);
}

function getDomain(url) {
  try { return new URL(url).hostname; } catch (_) { return url; }
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const el = document.createElement('div');
  el.className   = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2700);
}

// ─── 시작 ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
