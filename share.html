<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>담담 — 저장하기</title>
  <link rel="icon" href="./favicon.png">
  <meta property="og:image" content="./favicon.png">
  <meta property="og:url" content="https://hyunra94.github.io/damdam/share.html">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FF8FAB">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --pink:       #FF8FAB;
      --pink-light: #FFD6E0;
      --pink-pale:  #FFF0F5;
      --pink-deep:  #E8557A;
      --text:       #2D2D2D;
      --text-sub:   #888;
      --bg:         #FFF0F5;
      --white:      #FFFFFF;
      --radius:     16px;
      --shadow:     0 4px 20px rgba(255,143,171,0.18);
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: rgba(0,0,0,0.45);
      min-height: 100dvh;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .sheet {
      width: 100%;
      max-width: 480px;
      background: var(--white);
      border-radius: 24px 24px 0 0;
      padding: 12px 20px calc(20px + env(safe-area-inset-bottom));
      animation: slideUp .28s cubic-bezier(.25,.8,.25,1);
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .handle {
      width: 36px;
      height: 4px;
      background: #E0E0E0;
      border-radius: 2px;
      margin: 0 auto 16px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .btn-cancel {
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 15px;
      color: var(--text-sub);
      padding: 4px 0;
    }

    .btn-confirm {
      background: var(--pink);
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      color: white;
      padding: 8px 22px;
      border-radius: 20px;
      transition: background .15s, transform .1s;
    }

    .btn-confirm:active {
      transform: scale(.96);
      background: var(--pink-deep);
    }

    .btn-confirm:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    .preview {
      background: var(--pink-pale);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 20px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .preview-thumb-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, 52px);
      gap: 6px;
      margin-bottom: 20px;
    }

    .preview-thumb-grid img {
      width: 52px;
      height: 52px;
      border-radius: 10px;
      object-fit: cover;
      background: var(--pink-light);
    }

    .preview-icon {
      width: 52px;
      height: 52px;
      border-radius: 10px;
      background: var(--pink-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .preview-info {
      flex: 1;
      min-width: 0;
    }

    .preview-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .preview-sub {
      font-size: 12px;
      color: var(--text-sub);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .preview-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--pink-deep);
      background: var(--pink-light);
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 4px;
    }

    .section-label {
      font-size: 15px;
      font-weight: 700;
      color: var(--pink-deep);
      margin-bottom: 12px;
    }

    .folder-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }

    .folder-btn {
      padding: 10px 6px;
      border: 1.5px solid #EAEAEA;
      border-radius: 12px;
      background: var(--white);
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      transition: all .15s;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .folder-btn:active {
      transform: scale(.96);
    }

    .folder-btn.selected {
      border-color: var(--pink);
      background: var(--pink-pale);
      color: var(--pink-deep);
      font-weight: 700;
    }

    .memo-label {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .memo-input {
      width: 100%;
      resize: none;
      border: 1.5px solid #EAEAEA;
      border-radius: 12px;
      padding: 12px 14px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      background: var(--white);
      outline: none;
      transition: border-color .15s;
      line-height: 1.5;
    }

    .memo-input:focus {
      border-color: var(--pink);
    }

    .memo-input::placeholder {
      color: #C0C0C0;
    }

    .memo-count {
      text-align: right;
      font-size: 11px;
      color: var(--text-sub);
      margin-top: 4px;
    }

    .loading-folders {
      text-align: center;
      padding: 20px 0;
      color: var(--text-sub);
      font-size: 14px;
      grid-column: 1 / -1;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      white-space: nowrap;
      animation: fadeInOut 2.2s ease forwards;
      z-index: 999;
      max-width: calc(100% - 32px);
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @keyframes fadeInOut {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(10px);
      }
      20% {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      80% {
        opacity: 1;
      }
      100% {
        opacity: 0;
      }
    }

    .saving-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,240,245,0.85);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      z-index: 100;
    }

    .saving-overlay.show {
      display: flex;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--pink-light);
      border-top-color: var(--pink);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .saving-text {
      font-size: 15px;
      font-weight: 500;
      color: var(--pink-deep);
    }
  </style>
</head>

<body>

<div class="saving-overlay" id="savingOverlay">
  <div class="spinner"></div>
  <div class="saving-text">저장 중...</div>
</div>

<div class="sheet">
  <div class="handle"></div>

  <div class="toolbar">
    <button class="btn-cancel" onclick="cancel()">취소</button>
    <button class="btn-confirm" id="btnConfirm" onclick="saveShare()" disabled>확인</button>
  </div>

  <div id="previewArea"></div>

  <div class="section-label">어떤 폴더에 담을까요?</div>
  <div class="folder-grid" id="folderGrid">
    <div class="loading-folders">폴더 불러오는 중…</div>
  </div>

  <div class="memo-label">메모</div>
  <textarea
    class="memo-input"
    id="memoInput"
    rows="3"
    placeholder="키워드로 메모해두면 쉽게 찾아볼 수 있어요!"
    maxlength="200"
    oninput="document.getElementById('memoCount').textContent = this.value.length + '/200'"
  ></textarea>
  <div class="memo-count" id="memoCount">0/200</div>
</div>

<script>
const WORKER_URL = localStorage.getItem('damdam_worker_url') || '';
const SECRET_KEY = localStorage.getItem('damdam_secret_key') || '';

// 공유 데이터 캐시 키
// - 새 sw.js 안정화 버전: 절대 URL 키 사용
// - 기존 sw.js: 'pending', 'file-0' 같은 짧은 키 사용
// 둘 다 읽을 수 있게 하위호환 처리
const SHARE_SCOPE_BASE = new URL('./', location.href).href;
const SHARE_DATA_KEY = new URL('__damdam_share_pending__', SHARE_SCOPE_BASE).href;

function shareFileKey(i) {
  return new URL(`__damdam_share_file_${i}__`, SHARE_SCOPE_BASE).href;
}

async function matchFirst(cache, keys) {
  for (const key of keys) {
    const res = await cache.match(key);
    if (res) return { res, key };
  }
  return { res: null, key: null };
}

let shareData = null;
let sharedFiles = [];
let selectedFolders = [];

function init() {
  if (!WORKER_URL || !SECRET_KEY) {
    showToast('설정이 필요해요. 메인 화면에서 먼저 설정해주세요.');
    setTimeout(function() {
      location.href = 'index.html';
    }, 2000);
    return;
  }

  loadShareData();
}

async function loadShareData() {
  try {
    const cache = await caches.open('damdam-share-data');

    // 새 sw.js 키와 기존 sw.js 키를 모두 확인
    const matched = await matchFirst(cache, [
      SHARE_DATA_KEY,
      'pending',
      new URL('pending', SHARE_SCOPE_BASE).href
    ]);

    if (!matched.res) {
      // 일부 환경에서 GET 파라미터로 들어오는 경우 대비
      const p = new URLSearchParams(location.search);
      const title = p.get('title') || '';
      const text  = p.get('text')  || '';
      let url     = p.get('url')   || '';

      // 일부 앱은 url 필드가 아니라 text 안에 링크를 넣어 공유함
      if (!url && text) {
        const m = String(text).match(/https?:\/\/[^\s]+/);
        if (m) url = m[0];
      }

      if (url || text || title) {
        shareData = {
          type: url ? 'link' : 'memo',
          title: title,
          url: url,
          text: text
        };
      }
    } else {
      shareData = await matched.res.json();
      await cache.delete(matched.key);
    }
  } catch (e) {
    console.error('공유 데이터 읽기 실패:', e);
  }

  if (!shareData) {
    showToast('공유 데이터를 찾지 못했어요. 다시 공유해보세요.');
    setTimeout(function() {
      location.href = 'index.html';
    }, 1400);
    return;
  }

  if (shareData.type === 'image' && shareData.fileCount > 0) {
    try {
      const fileCache = await caches.open('damdam-share-files');

      for (let i = 0; i < shareData.fileCount; i++) {
        // 새 sw.js 파일 키와 기존 sw.js 파일 키를 모두 확인
        const matchedFile = await matchFirst(fileCache, [
          shareFileKey(i),
          `file-${i}`,
          new URL(`file-${i}`, SHARE_SCOPE_BASE).href
        ]);

        const fileRes = matchedFile.res;

        if (fileRes) {
          const blob = await fileRes.blob();
          const fileName = decodeURIComponent(
            fileRes.headers.get('X-File-Name') || `image_${i}.jpg`
          );

          sharedFiles.push(
            new File(
              [blob],
              fileName,
              { type: fileRes.headers.get('Content-Type') || 'image/jpeg' }
            )
          );
        }
      }

      const keys = await fileCache.keys();
      await Promise.all(keys.map(k => fileCache.delete(k)));
    } catch (e) {
      console.error('이미지 파일 읽기 실패:', e);
    }
  }

  renderPreview();
  loadFolders();
}

function renderPreview() {
  const area = document.getElementById('previewArea');
  area.innerHTML = '';

  if (!shareData) return;

  if (shareData.type === 'image' && sharedFiles.length > 0) {
    const grid = document.createElement('div');
    grid.className = 'preview-thumb-grid';

    sharedFiles.forEach(file => {
      const img = document.createElement('img');
      img.src = URL.createObjectURL(file);
      img.alt = file.name;
      grid.appendChild(img);
    });

    area.appendChild(grid);

    if (sharedFiles.length > 1) {
      const badge = document.createElement('div');
      badge.style.cssText = 'font-size:13px;color:#888;margin-bottom:16px;';
      badge.textContent = `이미지 ${sharedFiles.length}개`;
      area.appendChild(badge);
    }

  } else if (shareData.type === 'link') {
    const div = document.createElement('div');
    div.className = 'preview';

    let domain = '';

    try {
      domain = new URL(shareData.url).hostname;
    } catch (_) {}

    div.innerHTML = `
      <div class="preview-icon">🔗</div>
      <div class="preview-info">
        <div class="preview-badge">🔗 링크</div>
        <div class="preview-title">${escHtml(shareData.title || shareData.url)}</div>
        <div class="preview-sub">${escHtml(domain)}</div>
      </div>
    `;

    area.appendChild(div);

  } else {
    const div = document.createElement('div');
    div.className = 'preview';

    div.innerHTML = `
      <div class="preview-icon">📝</div>
      <div class="preview-info">
        <div class="preview-badge">📝 메모</div>
        <div class="preview-title">${escHtml(shareData.text || shareData.title || '텍스트')}</div>
      </div>
    `;

    area.appendChild(div);

    document.getElementById('memoInput').value = shareData.text || '';
    document.getElementById('memoCount').textContent = (shareData.text || '').length + '/200';
  }
}

function loadFolders() {
  const grid = document.getElementById('folderGrid');

  const xhr = new XMLHttpRequest();
  xhr.open('GET', WORKER_URL.replace(/\/$/, '') + '/folders', true);
  xhr.setRequestHeader('X-Secret-Key', SECRET_KEY);
  xhr.timeout = 10000;

  xhr.onload = function() {
    try {
      const data = JSON.parse(xhr.responseText);

      if (xhr.status < 200 || xhr.status >= 300) {
        throw new Error(data.error || `HTTP ${xhr.status}`);
      }

      const folders = data.folders || [];

      grid.innerHTML = '';

      folders.forEach(function(name) {
        const btn = document.createElement('button');
        btn.className = 'folder-btn';
        btn.textContent = name;
        btn.onclick = function() {
          selectFolder(name, btn);
        };
        grid.appendChild(btn);
      });

      const addBtn = document.createElement('button');
      addBtn.className = 'folder-btn';
      addBtn.textContent = '+ 폴더 추가';
      addBtn.style.color = '#CCC';
      addBtn.onclick = function() {
        addFolder();
      };

      grid.appendChild(addBtn);

    } catch (e) {
      console.error('폴더 불러오기 실패:', e, xhr.responseText);
      grid.innerHTML = `<div class="loading-folders">폴더 불러오기 실패 😢<br>${escHtml(e.message || '')}</div>`;
    }
  };

  xhr.onerror = function() {
    grid.innerHTML = '<div class="loading-folders">폴더 불러오기 실패 😢<br>CORS 또는 네트워크 오류</div>';
  };

  xhr.ontimeout = function() {
    grid.innerHTML = '<div class="loading-folders">폴더 불러오기 실패 😢<br>응답 시간 초과</div>';
  };

  xhr.send();
}

function selectFolder(name, btn) {
  const idx = selectedFolders.indexOf(name);

  if (idx >= 0) {
    selectedFolders.splice(idx, 1);
    btn.classList.remove('selected');
  } else {
    selectedFolders.push(name);
    btn.classList.add('selected');
  }

  document.getElementById('btnConfirm').disabled = selectedFolders.length === 0;
}

async function addFolder() {
  const name = prompt('새 폴더 이름을 입력하세요');

  if (!name || !name.trim()) return;

  const folderName = name.trim();
  const grid = document.getElementById('folderGrid');
  const addBtn = grid.lastElementChild;

  const btn = document.createElement('button');
  btn.className = 'folder-btn';
  btn.textContent = folderName;
  btn.onclick = function() {
    selectFolder(folderName, btn);
  };

  grid.insertBefore(btn, addBtn);
  selectFolder(folderName, btn);
}

async function saveShare() {
  if (!shareData) return;

  const memo = document.getElementById('memoInput').value.trim();
  const overlay = document.getElementById('savingOverlay');
  const confirmBtn = document.getElementById('btnConfirm');

  overlay.classList.add('show');
  confirmBtn.disabled = true;

  function onSuccess() {
    showToast('담았어요 🌸');

    setTimeout(function() {
      try {
        window.close();
      } catch (_) {}

      location.href = 'index.html';
    }, 800);
  }

  function onError(msg) {
    overlay.classList.remove('show');
    confirmBtn.disabled = false;
    showToast('저장 실패: ' + (msg || ''));
  }

  function handleResult(d) {
    if (d.success) {
      if (d.skippedCount && d.skippedCount > 0) {
        showToast(`저장 완료! 중복 ${d.skippedCount}개는 제외했어요 🌸`);

        setTimeout(function() {
          try {
            window.close();
          } catch (_) {}

          location.href = 'index.html';
        }, 1200);
      } else {
        onSuccess();
      }

      return;
    }

    if (d.duplicate) {
      overlay.classList.remove('show');
      confirmBtn.disabled = false;
      showToast(d.error || '이미 담겨있는 항목이에요 🌸');
      return;
    }

    onError(d.error || '저장 실패');
  }

  if (shareData.type === 'image') {
    if (!sharedFiles.length) {
      onError('이미지 파일을 읽지 못했어요. 다시 공유해보세요.');
      return;
    }

    const fd = new FormData();

    sharedFiles.forEach(function(f) {
      fd.append('images', f);
    });

    selectedFolders.forEach(function(f) {
      fd.append('folders[]', f);
    });

    if (memo) {
      fd.append('memo', memo);
    }

    const xhr = new XMLHttpRequest();
    xhr.open('POST', WORKER_URL.replace(/\/$/, '') + '/save-images', true);
    xhr.setRequestHeader('X-Secret-Key', SECRET_KEY);
    xhr.timeout = 30000;

    xhr.onload = function() {
      try {
        const d = JSON.parse(xhr.responseText || '{}');

        if (xhr.status < 200 || xhr.status >= 300) {
          onError(d.error || `HTTP ${xhr.status}`);
          return;
        }

        handleResult(d);
      } catch (e) {
        onError(`HTTP ${xhr.status || ''} ${e.message || ''}`);
      }
    };

    xhr.onerror = function() {
      onError('네트워크 오류');
    };

    xhr.ontimeout = function() {
      onError('응답 시간 초과');
    };

    xhr.send(fd);

  } else {
    const body = shareData.type === 'link'
      ? {
          title: shareData.title || shareData.url,
          url: shareData.url,
          folders: selectedFolders,
          memo: memo
        }
      : {
          title: shareData.text || shareData.title || '메모',
          url: '',
          folders: selectedFolders,
          memo: shareData.text || memo
        };

    const xhr2 = new XMLHttpRequest();
    xhr2.open('POST', WORKER_URL.replace(/\/$/, '') + '/save-link', true);
    xhr2.setRequestHeader('X-Secret-Key', SECRET_KEY);
    xhr2.setRequestHeader('Content-Type', 'application/json');
    xhr2.timeout = 10000;

    xhr2.onload = function() {
      try {
        const d = JSON.parse(xhr2.responseText || '{}');

        if (xhr2.status < 200 || xhr2.status >= 300) {
          onError(d.error || `HTTP ${xhr2.status}`);
          return;
        }

        handleResult(d);
      } catch (e) {
        onError(`HTTP ${xhr2.status || ''} ${e.message || ''}`);
      }
    };

    xhr2.onerror = function() {
      onError('네트워크 오류');
    };

    xhr2.ontimeout = function() {
      onError('응답 시간 초과');
    };

    xhr2.send(JSON.stringify(body));
  }
}

function cancel() {
  try {
    window.close();
  } catch (_) {}

  history.back();
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function showToast(msg) {
  const old = document.querySelector('.toast');
  if (old) old.remove();

  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);

  setTimeout(function() {
    el.remove();
  }, 2300);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker
    .register('./sw.js')
    .then(function() {
      init();
    })
    .catch(function() {
      init();
    });
} else {
  init();
}
</script>

</body>
</html>
